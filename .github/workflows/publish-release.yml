name: Publish release

on:
  repository_dispatch:
    types: [publish-release]
  workflow_dispatch:
    inputs:
      tag:
        description: Version tag (e.g. v1.2.3)
        required: true
      notes:
        description: Release notes (markdown)
        required: false
        default: ""

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify HMAC signature
        if: github.event_name == 'repository_dispatch'
        env:
          HMAC_SECRET: ${{ secrets.WYRMFLOW_RELEASE_DISPATCH_HMAC }}
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
          EXPECTED_SIG: ${{ github.event.client_payload.signature }}
        run: |
          computed=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$HMAC_SECRET" | awk '{print $2}')
          if [ "$computed" != "$EXPECTED_SIG" ]; then
            echo "HMAC verification failed. Aborting."
            exit 1
          fi
          echo "HMAC verified."

      - name: Set release variables (dispatch)
        if: github.event_name == 'repository_dispatch'
        env:
          TAG: ${{ github.event.client_payload.tag }}
          NOTES: ${{ github.event.client_payload.notes }}
        run: |
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "notes=$NOTES" >> $GITHUB_OUTPUT
        id: vars_dispatch

      - name: Set release variables (manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG: ${{ inputs.tag }}
          NOTES: ${{ inputs.notes }}
        run: |
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "notes=$NOTES" >> $GITHUB_OUTPUT
        id: vars_manual

      - name: Resolve variables
        id: vars
        env:
          DISPATCH_TAG: ${{ steps.vars_dispatch.outputs.tag }}
          DISPATCH_NOTES: ${{ steps.vars_dispatch.outputs.notes }}
          MANUAL_TAG: ${{ steps.vars_manual.outputs.tag }}
          MANUAL_NOTES: ${{ steps.vars_manual.outputs.notes }}
        run: |
          TAG="${DISPATCH_TAG:-$MANUAL_TAG}"
          NOTES="${DISPATCH_NOTES:-$MANUAL_NOTES}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "notes=$NOTES" >> $GITHUB_OUTPUT

      - name: Download release assets
        if: github.event_name == 'repository_dispatch'
        env:
          ASSETS: ${{ toJson(github.event.client_payload.assets) }}
        run: |
          mkdir -p release-assets
          echo "$ASSETS" | jq -r '.[] | "\(.url) \(.filename)"' | while read -r url filename; do
            echo "Downloading $filename"
            curl -L -f -o "release-assets/$filename" "$url"
          done
          ls -lh release-assets/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.vars.outputs.tag }}
          NOTES: ${{ steps.vars.outputs.notes }}
        run: |
          if [ -d release-assets ] && [ "$(ls -A release-assets)" ]; then
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "$NOTES" \
              release-assets/*
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "$NOTES"
          fi
